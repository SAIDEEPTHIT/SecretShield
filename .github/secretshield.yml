name: SecretShield CI Pipeline

on:
  push:
    branches: [ main, dev, demo-bad ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────
  # STAGE 1: SECRET DETECTION
  # ─────────────────────────────────────────
  secret-scan:
    name: "🔍 Stage 1 — Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # STAGE 2: CODE VALIDATION (runs only if Stage 1 passes)
  # ─────────────────────────────────────────
  code-quality:
    name: "🧪 Stage 2 — Code Validation"
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tests
        run: pytest app/test_app.py -v

  # ─────────────────────────────────────────
  # STAGE 3: DEPLOY GATE (runs only if both above pass)
  # ─────────────────────────────────────────
  deploy-gate:
    name: "🚀 Stage 3 — Deploy Gate"
    runs-on: ubuntu-latest
    needs: [secret-scan, code-quality]
    steps:
      - name: Security Report
        run: |
          echo "================================================"
          echo "  SECRETSHIELD SECURITY REPORT"
          echo "================================================"
          echo "  Stage 1: Secret Detection    ✅ PASSED"
          echo "  Stage 2: Code Validation     ✅ PASSED"
          echo "  Stage 3: Deploy Gate         ✅ PASSED"
          echo "================================================"
          echo "  No secrets detected. Safe to deploy!"
          echo "================================================"